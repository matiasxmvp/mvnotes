<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MVNOTES</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #09090b; color: #fafafa; }

      #pre-splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 2rem; background: #09090b;
      }
      #pre-splash .ring {
        position: relative; width: 72px; height: 72px;
      }
      #pre-splash .ring svg { display: block; }
      #pre-splash .ring .icon {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
      }
      /* Arc: fixed-length dash that spins continuously */
      #pre-splash .arc {
        stroke-dasharray: 52 149;
        transform-origin: 36px 36px;
        animation: arc-spin 1.1s linear infinite;
      }
      @keyframes arc-spin {
        from { transform: rotate(-90deg); }
        to   { transform: rotate(270deg); }
      }
      #pre-splash .label {
        display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      }
      #pre-splash .name {
        font-family: system-ui, sans-serif;
        font-size: 1.25rem; font-weight: 700;
        letter-spacing: -0.02em; color: #fafafa;
        margin: 0;
      }
      #pre-splash .dots { display: flex; gap: 8px; align-items: center; }
      #pre-splash .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #a78bfa;
        animation: dot-pulse 1.2s ease-in-out infinite;
      }
      #pre-splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #pre-splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50%       { opacity: 1;   transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Shown instantly before React loads; replaced when JS mounts -->
      <div id="pre-splash">
        <div class="ring">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
            <circle cx="36" cy="36" r="32" stroke="#27272a" stroke-width="3"/>
            <circle cx="36" cy="36" r="32" stroke="#a78bfa" stroke-width="3"
                    stroke-linecap="round" class="arc"/>
          </svg>
          <div class="icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                 stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
              <path d="m15 5 4 4"/>
            </svg>
          </div>
        </div>
        <div class="label">
          <p class="name">MVNOTES</p>
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
